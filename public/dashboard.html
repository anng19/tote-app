<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tote — Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap');

  :root{
    --bg:#F7F4EF; --card:#FFFFFF; --line:#E8E2D8; --ink:#3E3A35; --muted:#6E675C;
    --sage:#9CAB92; --sage-dfeep:#7C8E72; --blush:#E3C9BE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Be Vietnam Pro', sans-serif; font-weight:400;
    min-height:100vh; padding-bottom:70px; -webkit-font-smoothing:antialiased;
  }
  header{ padding:44px 24px 26px; text-align:center; }
  .eyebrow{
    font-size:11px; letter-spacing:.28em; text-transform:uppercase;
    color:var(--sage-deep); font-weight:500; margin-bottom:14px;
  }
  h1{
    font-family:'Be Vietnam Pro', sans-serif; font-weight:400; font-style:italic;
    font-size:clamp(28px,7vw,38px); margin:0; color:var(--ink);
  }
  .sub{ margin:12px auto 0; font-size:14px; color:var(--muted); max-width:320px; line-height:1.6; }
  .divider{ width:36px; height:1px; background:var(--sage); margin:22px auto 0; }

  main{ max-width:520px; margin:0 auto; padding:8px 22px 0; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:24px; margin-bottom:22px; }

  .pin-row{ display:flex; gap:10px; align-items:flex-end; }
  .pin-row > div{ flex:1; }
  label{
    display:block; font-size:11px; font-weight:500; text-transform:uppercase;
    letter-spacing:.12em; color:var(--muted); margin-bottom:7px;
  }
  input{
    width:100%; padding:11px 2px; border:none; border-bottom:1px solid var(--line);
    font-family:inherit; font-size:15px; background:transparent; color:var(--ink);
  }
  input:focus{ outline:none; border-color:var(--sage); }
  .pin-row button{
    padding:11px 18px; border-radius:30px; border:none; background:var(--ink);
    color:#fff; font-family:inherit; font-weight:500; font-size:13px; cursor:pointer;
  }
  .pin-hint{ font-size:11.5px; color:var(--muted); margin-top:10px; line-height:1.5; }

  #dashboard{ display:none; }
  .top-actions{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .refresh{ font-size:12.5px; color:var(--sage-deep); font-weight:500; cursor:pointer; text-decoration:underline; text-underline-offset:2px; }

  #editPanel{ display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(62,58,53,0.3); z-index:300; }
  #editPanel.show{ display:flex; }
  #editPanel{ justify-content:center; align-items:center; }
  .edit-modal{ background:var(--card); border-radius:20px; padding:28px 24px; max-width:440px; width:90%; max-height:90vh; overflow-y:auto; }
  .edit-modal h2{ margin:0 0 20px; font-size:20px; font-weight:500; }
  .edit-modal label{ display:block; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin:16px 0 7px; }
  .edit-modal label:first-of-type{ margin-top:0; }
  .edit-modal input, .edit-modal textarea{ width:100%; padding:11px 2px; border:none; border-bottom:1px solid var(--line); font-family:inherit; font-size:14px; background:transparent; color:var(--ink); }
  .edit-modal input:focus, .edit-modal textarea:focus{ outline:none; border-color:var(--sage); }
  .edit-modal textarea{ resize:none; min-height:50px; }
  .edit-row2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .edit-modal-actions{ display:flex; gap:10px; margin-top:24px; }
  .edit-modal-actions button{ flex:1; padding:12px; border-radius:30px; border:none; font-family:inherit; font-weight:500; font-size:13px; cursor:pointer; }
  .edit-modal-actions .save{ background:var(--ink); color:#fff; }
  .edit-modal-actions .cancel{ background:var(--line); color:var(--muted); }
  .edit-modal-actions .delete{ background:#E8D7CE; color:#8A5A45; }

  .customer-item.editable{ cursor:pointer; transition:.2s; }
  .customer-item.editable:hover{ background:var(--bg); }
  .item-delete-btn{ font-size:12px; color:#B0473F; cursor:pointer; text-decoration:underline; text-underline-offset:2px; margin-left:8px; }

  .add-item-btn{ font-size:12px; color:var(--sage-deep); cursor:pointer; text-decoration:underline; text-underline-offset:2px; margin-top:12px; display:block; }
  .add-item-form{ background:var(--bg); border-radius:12px; padding:14px; margin-top:12px; display:none; }
  .add-item-form.show{ display:block; }
  .add-item-form label{ font-size:10px; margin-top:10px; margin-bottom:5px; }
  .add-item-form input, .add-item-form select{ width:100%; padding:8px 2px; border:none; border-bottom:1px solid var(--line); font-family:inherit; font-size:13px; background:transparent; color:var(--ink); }
  .add-item-form input:focus, .add-item-form select:focus{ outline:none; border-color:var(--sage); }
  .add-item-form .form-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .add-item-form-actions{ display:flex; gap:8px; margin-top:12px; }
  .add-item-form-actions button{ flex:1; padding:9px; border-radius:20px; border:none; font-family:inherit; font-weight:500; font-size:11px; cursor:pointer; }
  .add-item-form-actions .add{ background:var(--sage); color:#fff; }
  .add-item-form-actions .cancel{ background:var(--line); color:var(--muted); }

  .stats{ display:flex; gap:10px; margin-bottom:20px; }
  .stat{ flex:1; background:var(--bg); border-radius:14px; padding:16px 12px; text-align:center; }
  .stat .num{ font-family:'Be Vietnam Pro'; font-size:22px; font-weight:500; }
  .stat .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-top:3px; }

  .customer-menu{
    display:flex; gap:8px; overflow-x:auto; padding-bottom:14px; margin-bottom:18px;
    border-bottom:1px solid var(--line); scrollbar-width:none;
  }
  .customer-menu::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; padding:8px 16px; border-radius:20px; border:1px solid var(--line);
    background:var(--bg); font-size:12.5px; font-weight:500; color:var(--muted);
    cursor:pointer; white-space:nowrap; transition:.15s;
  }
  .chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }

  .customer-block{ border-top:1px solid var(--line); padding:18px 0; }
  .customer-block:first-child{ border-top:none; padding-top:0; }
  .customer-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .customer-name{ font-weight:600; font-size:16px; }
  .customer-total{ font-weight:500; font-size:14px; color:var(--sage-deep); }
  .customer-item{
    font-size:13px; color:var(--muted); padding:5px 0; display:flex;
    justify-content:space-between; gap:10px; border-top:1px dashed var(--line);
  }
  .customer-item:first-of-type{ border-top:none; }
  .customer-item span:first-child{ flex:1; }
  .platform-tag{ opacity:.6; }
  .item-link{ font-size:11px; color:#A69E90; word-break:break-word; margin-top:1px; }
  .fulfilled-btn{
    margin-top:10px; font-size:11.5px; color:var(--muted); cursor:pointer;
    text-decoration:underline; text-underline-offset:2px;
  }
  .empty{ text-align:center; color:var(--muted); font-size:14px; padding:30px 0; font-style:italic; }

  .actions{ display:flex; gap:10px; margin-top:8px; }
  .actions button{
    flex:1; padding:13px; border-radius:30px; font-family:inherit; font-weight:500;
    font-size:12.5px; letter-spacing:.06em; text-transform:uppercase; cursor:pointer;
    border:1px solid var(--ink); background:var(--ink); color:#fff; transition:.2s;
  }
  .actions button:hover{ background:#2A2723; }

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 22px; border-radius:30px;
    font-size:13px; font-weight:400; opacity:0; transition:.3s; pointer-events:none;
    letter-spacing:.02em; max-width:86%; text-align:center; z-index:200;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast-undo{ margin-left:10px; text-decoration:underline; text-underline-offset:2px; cursor:pointer; font-weight:600; color:#F2E4D8; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Owner only</div>
  <h1>tote — dashboard</h1>
  <p class="sub">Reads every customer's cart from your server.</p>
  <div class="divider"></div>
</header>

<main>
  <div class="card" id="pinCard">
    <label for="pin">Enter your PIN</label>
    <div class="pin-row">
      <div><input id="pin" type="password" inputmode="numeric" placeholder="••••"></div>
      <button type="button" id="unlockBtn">Unlock</button>
    </div>
    <div class="pin-hint">.</div>
  </div>

  <div id="dashboard">
    <div class="card">
      <div class="top-actions"><span class="refresh" id="refreshBtn">↻ Refresh</span></div>
      <div class="stats">
        <div class="stat"><div class="num" id="statCustomers">0</div><div class="lbl">Customers</div></div>
        <div class="stat"><div class="num" id="statItems">0</div><div class="lbl">Items</div></div>
        <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">Total</div></div>
      </div>
      <div class="customer-menu" id="customerMenu"></div>
      <div id="customerList"></div>
      <div class="actions">
        <button id="exportBtn">Export all orders</button>
      </div>
    </div>
  </div>
</main>

<div id="editPanel">
  <div class="edit-modal">
    <h2 id="editTitle">Edit Item</h2>
    <label for="editName">Item name</label>
    <input id="editName" type="text">
    <label for="editPlatform">Platform</label>
    <select id="editPlatform">
      <option value="shopee">Shopee</option>
      <option value="instagram">Instagram</option>
    </select>
    <label for="editLink">Link</label>
    <input id="editLink" type="text">
    <div class="edit-row2">
      <div>
        <label for="editPrice">Price</label>
        <input id="editPrice" type="text" inputmode="numeric">
      </div>
      <div>
        <label for="editQty">Quantity</label>
        <input id="editQty" type="text" inputmode="numeric">
      </div>
    </div>
    <label for="editNote">Notes</label>
    <textarea id="editNote"></textarea>
    <div class="edit-modal-actions">
      <button class="save" id="editSave">Save</button>
      <button class="delete" id="editDelete">Delete</button>
      <button class="cancel" id="editCancel">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allCarts = [];
let activeFilter = null;
let currentPin = '';
let editingCart = null;
let editingItemIndex = null;

const toastEl = document.getElementById('toast');
const editPanel = document.getElementById('editPanel');

function showToast(msg){
  toastEl.innerHTML = escapeHtml(msg);
  toastEl.classList.add('show');
  clearTimeout(toastEl._hideTimer);
  toastEl._hideTimer = setTimeout(()=> toastEl.classList.remove('show'), 2400);
}
function showUndoToast(msg, undoFn){
  toastEl.innerHTML = escapeHtml(msg) + ' <span class="toast-undo" id="toastUndo">Undo</span>';
  toastEl.classList.add('show');
  clearTimeout(toastEl._hideTimer);
  document.getElementById('toastUndo').addEventListener('click', ()=>{
    toastEl.classList.remove('show');
    undoFn();
  });
  toastEl._hideTimer = setTimeout(()=> toastEl.classList.remove('show'), 6000);
}
function formatVND(n){ return n.toLocaleString('en-US') + ' VND'; }
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function fetchJson(url, options, attempts = 3){
  let lastErr;
  for(let i = 0; i < attempts; i++){
    try{
      const res = await fetch(url, options);
      if(res.status === 401) throw new Error('unauthorized');
      if(!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    }catch(e){
      lastErr = e;
      if(e.message === 'unauthorized') break;
    }
    if(i < attempts - 1) await new Promise(r => setTimeout(r, 350 * (i + 1)));
  }
  throw lastErr;
}

document.getElementById('unlockBtn').addEventListener('click', unlock);
document.getElementById('pin').addEventListener('keydown', (e)=>{ if(e.key === 'Enter') unlock(); });

async function unlock(){
  const val = document.getElementById('pin').value.trim();
  if(!val){ showToast('Enter a PIN'); return; }
  currentPin = val;
  try{
    await fetchJson('/api/carts?pin=' + encodeURIComponent(currentPin));
  }catch(e){
    showToast('Wrong PIN');
    return;
  }
  document.getElementById('pinCard').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadDashboard();
}

document.getElementById('refreshBtn').addEventListener('click', loadDashboard);

async function loadDashboard(){
  const customerListEl = document.getElementById('customerList');
  customerListEl.innerHTML = '<div class="empty">Loading...</div>';
  try{
    const list = await fetchJson('/api/carts?pin=' + encodeURIComponent(currentPin));
    allCarts = list.map(c => ({ key: c.slug, name: c.name, items: c.items }));
  }catch(e){
    customerListEl.innerHTML = '<div class="empty">Could not load data. Tap Refresh to try again.</div>';
    return;
  }
  renderDashboard();
}

function renderDashboard(){
  const customerListEl = document.getElementById('customerList');
  const menuEl = document.getElementById('customerMenu');

  if(allCarts.length === 0){
    customerListEl.innerHTML = '<div class="empty">No orders yet</div>';
    menuEl.innerHTML = '';
    document.getElementById('statCustomers').textContent = '0';
    document.getElementById('statItems').textContent = '0';
    document.getElementById('statTotal').textContent = '0';
    return;
  }

  let grandTotal = 0, totalItemCount = 0;
  allCarts.forEach(cart=>{
    grandTotal += cart.items.reduce((s,it)=> s + it.price*it.qty, 0);
    totalItemCount += cart.items.length;
  });
  document.getElementById('statCustomers').textContent = allCarts.length;
  document.getElementById('statItems').textContent = totalItemCount;
  document.getElementById('statTotal').textContent = formatVND(grandTotal);

  menuEl.innerHTML = `<div class="chip ${activeFilter === null ? 'active' : ''}" data-key="">All</div>` +
    allCarts.map(c => `<div class="chip ${activeFilter === c.key ? 'active' : ''}" data-key="${c.key}">${escapeHtml(c.name)}</div>`).join('');
  menuEl.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      activeFilter = chip.dataset.key || null;
      renderDashboard();
    });
  });

  const visible = activeFilter ? allCarts.filter(c => c.key === activeFilter) : allCarts;

  customerListEl.innerHTML = visible.map(cart=>{
    const custTotal = cart.items.reduce((s,it)=> s + it.price*it.qty, 0);
    const itemLines = cart.items.map((it, idx) => `
      <div class="customer-item editable" data-cart-key="${cart.key}" data-item-index="${idx}">
        <span>
          ${it.qty > 1 ? it.qty + '× ' : ''}${escapeHtml(it.name || '(untitled)')}
          <span class="platform-tag">· ${it.platform === 'shopee' ? 'Shopee' : 'IG'}</span>
          ${it.link ? `<div class="item-link">${escapeHtml(it.link)}</div>` : ''}
        </span>
        <span>${formatVND(it.price)}</span>
      </div>
    `).join('');
    return `
      <div class="customer-block">
        <div class="customer-head">
          <span class="customer-name">${escapeHtml(cart.name)}</span>
          <span class="customer-total">${formatVND(custTotal)}</span>
        </div>
        ${itemLines}
        <button class="add-item-btn" data-cart-key="${cart.key}">+ Add item</button>
        <div class="add-item-form" data-cart-key="${cart.key}">
          <label for="newItemName-${cart.key}">Item name</label>
          <input id="newItemName-${cart.key}" type="text" placeholder="Item name">
          <label for="newItemPlatform-${cart.key}">Platform</label>
          <select id="newItemPlatform-${cart.key}">
            <option value="shopee">Shopee</option>
            <option value="instagram">Instagram</option>
          </select>
          <label for="newItemLink-${cart.key}">Link (optional)</label>
          <input id="newItemLink-${cart.key}" type="text" placeholder="Product link">
          <div class="form-row">
            <div><label for="newItemPrice-${cart.key}">Price</label><input id="newItemPrice-${cart.key}" type="text" inputmode="numeric" placeholder="0"></div>
            <div><label for="newItemQty-${cart.key}">Qty</label><input id="newItemQty-${cart.key}" type="text" inputmode="numeric" placeholder="1"></div>
          </div>
          <label for="newItemNote-${cart.key}">Notes (optional)</label>
          <textarea id="newItemNote-${cart.key}" placeholder="Size, color, etc..."></textarea>
          <div class="add-item-form-actions">
            <button class="add" data-cart-key="${cart.key}">Add</button>
            <button class="cancel" data-cart-key="${cart.key}">Cancel</button>
          </div>
        </div>
        <div class="fulfilled-btn" data-key="${cart.key}">Mark as fulfilled (clears this cart)</div>
      </div>
    `;
  }).join('');

  // Edit item listeners
  customerListEl.querySelectorAll('.customer-item.editable').forEach(el=>{
    el.addEventListener('click', ()=>{ 
      const cartKey = el.dataset.cartKey;
      const itemIdx = parseInt(el.dataset.itemIndex, 10);
      openEditModal(cartKey, itemIdx);
    });
  });

  // Add item listeners
  customerListEl.querySelectorAll('.add-item-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const cartKey = btn.dataset.cartKey;
      const form = customerListEl.querySelector(`.add-item-form[data-cart-key="${cartKey}"]`);
      form.classList.toggle('show');
    });
  });

  customerListEl.querySelectorAll('.add-item-form-actions .add').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const cartKey = btn.dataset.cartKey;
      const form = customerListEl.querySelector(`.add-item-form[data-cart-key="${cartKey}"]`);
      const name = document.getElementById(`newItemName-${cartKey}`).value.trim();
      const platform = document.getElementById(`newItemPlatform-${cartKey}`).value;
      const link = document.getElementById(`newItemLink-${cartKey}`).value.trim();
      const price = parseInt(document.getElementById(`newItemPrice-${cartKey}`).value) || 0;
      const qty = parseInt(document.getElementById(`newItemQty-${cartKey}`).value) || 1;
      const note = document.getElementById(`newItemNote-${cartKey}`).value.trim();
      
      if(!name || price <= 0){ showToast('Fill in name and price'); return; }
      
      const cart = allCarts.find(c => c.key === cartKey);
      if(!cart) return;
      
      cart.items.push({ name, platform, link, price, qty, note });
      try{
        await fetchJson('/api/cart/' + cartKey + '?pin=' + encodeURIComponent(currentPin), {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: cart.name, items: cart.items })
        });
        form.classList.remove('show');
        renderDashboard();
        showToast('Item added');
      }catch(e){
        showToast('Could not save item');
      }
    });
  });

  customerListEl.querySelectorAll('.add-item-form-actions .cancel').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const cartKey = btn.dataset.cartKey;
      const form = customerListEl.querySelector(`.add-item-form[data-cart-key="${cartKey}"]`);
      form.classList.remove('show');
    });
  });

  // Fulfilled listeners
  customerListEl.querySelectorAll('.fulfilled-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const key = btn.dataset.key;
      const cart = allCarts.find(c => c.key === key);
      if(!cart) return;
      try{
        const result = await fetchJson('/api/cart/' + key + '?pin=' + encodeURIComponent(currentPin), { method: 'DELETE' });
        allCarts = allCarts.filter(c => c.key !== key);
        renderDashboard();
        showUndoToast(cart.name + '\u2019s order marked fulfilled', async ()=>{
          await fetchJson('/api/cart-restore/' + key + '?pin=' + encodeURIComponent(currentPin), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: cart.name, items: cart.items })
          });
          await loadDashboard();
        });
      }catch(e){
        showToast('Could not clear that cart, try again');
      }
    });
  });
}

function openEditModal(cartKey, itemIdx){
  const cart = allCarts.find(c => c.key === cartKey);
  if(!cart || !cart.items[itemIdx]) return;
  
  editingCart = cartKey;
  editingItemIndex = itemIdx;
  const item = cart.items[itemIdx];
  
  document.getElementById('editTitle').textContent = 'Edit Item';
  document.getElementById('editName').value = item.name || '';
  document.getElementById('editPlatform').value = item.platform || 'shopee';
  document.getElementById('editLink').value = item.link || '';
  document.getElementById('editPrice').value = item.price || '';
  document.getElementById('editQty').value = item.qty || 1;
  document.getElementById('editNote').value = item.note || '';
  
  editPanel.classList.add('show');
}

function closeEditModal(){
  editPanel.classList.remove('show');
  editingCart = null;
  editingItemIndex = null;
}

document.getElementById('editCancel').addEventListener('click', closeEditModal);
editPanel.addEventListener('click', (e)=>{
  if(e.target === editPanel) closeEditModal();
});

document.getElementById('editSave').addEventListener('click', async ()=>{
  if(!editingCart || editingItemIndex === null) return;
  const cart = allCarts.find(c => c.key === editingCart);
  if(!cart) return;
  
  cart.items[editingItemIndex] = {
    name: document.getElementById('editName').value.trim() || '(untitled)',
    platform: document.getElementById('editPlatform').value,
    link: document.getElementById('editLink').value.trim(),
    price: parseInt(document.getElementById('editPrice').value) || 0,
    qty: parseInt(document.getElementById('editQty').value) || 1,
    note: document.getElementById('editNote').value.trim()
  };
  
  try{
    await fetchJson('/api/cart/' + editingCart + '?pin=' + encodeURIComponent(currentPin), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: cart.name, items: cart.items })
    });
    closeEditModal();
    renderDashboard();
    showToast('Item updated');
  }catch(e){
    showToast('Could not save changes');
  }
});

document.getElementById('editDelete').addEventListener('click', async ()=>{
  if(!editingCart || editingItemIndex === null) return;
  const cart = allCarts.find(c => c.key === editingCart);
  if(!cart) return;
  
  const deleted = cart.items.splice(editingItemIndex, 1)[0];
  
  try{
    await fetchJson('/api/cart/' + editingCart + '?pin=' + encodeURIComponent(currentPin), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: cart.name, items: cart.items })
    });
    closeEditModal();
    renderDashboard();
    showUndoToast('Item deleted', async ()=>{
      cart.items.splice(editingItemIndex, 0, deleted);
      await fetchJson('/api/cart/' + editingCart + '?pin=' + encodeURIComponent(currentPin), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: cart.name, items: cart.items })
      });
      await loadDashboard();
    });
  }catch(e){
    cart.items.splice(editingItemIndex, 0, deleted);
    showToast('Could not delete item');
  }
});

document.getElementById('exportBtn').addEventListener('click', async ()=>{
  if(allCarts.length === 0){ showToast('No orders yet'); return; }
  let text = 'ALL ORDERS\n\n';
  let grandTotal = 0;
  allCarts.forEach(cart=>{
    const custTotal = cart.items.reduce((s,it)=> s + it.price*it.qty, 0);
    grandTotal += custTotal;
    text += `— ${cart.name} (${formatVND(custTotal)}) —\n`;
    cart.items.forEach(it=>{
      text += `  ${it.qty > 1 ? it.qty + '× ' : ''}${it.name || '(untitled)'} [${it.platform}] — ${formatVND(it.price)}\n`;
      if(it.link) text += `  Link: ${it.link}\n`;
      if(it.note) text += `  Note: ${it.note}\n`;
    });
    text += '\n';
  });
  text += `GRAND TOTAL: ${formatVND(grandTotal)}`;
  try{
    await navigator.clipboard.writeText(text);
    showToast('All orders copied');
  }catch(e){
    showToast('Could not copy, try again');
  }
});
</script>
</body>
</html>
